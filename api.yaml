openapi: 3.0.3
info:
  title: cli-mgt-svc
  version: "2.0"
  description: |
    Management API for the 5G CLI platform (v2).

    v2 collapses v1's role hierarchy, NE profiles, command-def patterns,
    AWS-IAM evaluator and mgt-permissions into a single authorization
    question:

    > **Can user `X` execute command `Y` on NE `Z`?**

    Allowed ⇔ `X` enabled + not locked + not blacklisted (and matches any
    whitelist if present) AND command `Y` is registered on NE `Z`
    (`command.ne_id == Z.id`) AND `X ∈` some `ne_access_group` containing `Z`
    AND `X ∈` some `cmd_exec_group` containing `Y`.

    **Auth:** Most endpoints require `Authorization: Basic <jwt>`.
    The token returned by `POST /aa/authenticate` already includes the
    `Basic ` prefix — pass it back verbatim. The JWT carries a `role`
    claim (`super_admin`, `admin`, or `user`).

    **Permission tiers:**
    - `super_admin` — full access, can manage all accounts including other super_admins
    - `admin` — can configure everything except cannot modify/delete super_admin accounts
    - `user` — read-only on the management surface; all write endpoints return 403

    Read endpoints (GET) are available to any authenticated user.
    Write endpoints (POST/PUT/DELETE) require `admin` or `super_admin` role.

servers:
  - url: http://localhost:3000
    description: Local

security: []

tags:
  - name: System
    description: Health check, metrics, docs
  - name: Auth
    description: Login, token validation, password change
  - name: Users
    description: User CRUD + admin password reset
  - name: NEs
    description: Network Element CRUD
  - name: Commands
    description: Command registry — exact text per (NE, service)
  - name: NE Access Groups
    description: M:N user ↔ NE — "who can reach which boxes"
  - name: Cmd Exec Groups
    description: M:N user ↔ command — "who can run which commands"
  - name: Password Policy
    description: Singleton global password policy
  - name: Access List
    description: Blacklist / whitelist gating login
  - name: Authorize
    description: The one-question evaluator
  - name: Import/Export
    description: CSV bulk import/export for users, NEs, commands
  - name: History
    description: Audit log + cli-gate audit push
  - name: Config Backup
    description: NETCONF XML backup storage

paths:
  # ── System ─────────────────────────────────────────────────────────
  /health:
    get:
      tags: [System]
      summary: Ping the DB
      responses:
        "200": { description: DB still alive }
        "500": { description: DB unreachable }
  /metrics:
    get:
      tags: [System]
      summary: Runtime metrics (Go + app-level counters)
      responses: { "200": { description: JSON metrics } }

  # ── Auth ───────────────────────────────────────────────────────────
  /aa/authenticate:
    post:
      tags: [Auth]
      summary: Log in → JWT
      description: |
        Rate-limited. Runs the full login gate: access-list (blacklist /
        whitelist) → account state (disabled / locked) → password-expiry →
        bcrypt → lockout counter. Returns the token prefixed with
        `Basic `; pass it back verbatim in the `Authorization` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: admin }
                password: { type: string, example: admin }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  token:  { type: string, example: "Basic eyJhbGciOi…" }
                  role:   { type: string, enum: [super_admin, admin, user], example: admin }
        "401": { description: Invalid credentials }
        "403": { description: Account locked, disabled, access-list-denied, or password expired }
  /aa/validate-token:
    post:
      tags: [Auth]
      summary: Decode a token
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [token], properties: { token: { type: string } } }
      responses:
        "200":
          description: Valid
          content: { application/json: { schema: { type: object, properties: { status: { type: string }, username: { type: string }, role: { type: string } } } } }
        "401": { description: Invalid / expired }
  /aa/change-password:
    post:
      tags: [Auth]
      summary: Change own password (authenticated)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string }
      responses:
        "200": { description: OK }
        "400": { description: Policy violation, wrong old password, or reuse-history match }
        "401": { description: Unauthenticated }

  # ── Users ──────────────────────────────────────────────────────────
  /aa/users:
    get:
      tags: [Users]
      summary: List users
      security: [ { BasicJWT: [] } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } }
    post:
      tags: [Users]
      summary: Create a user (admin+ required; runs the password policy)
      description: |
        Only `admin` or `super_admin` can create users. Only `super_admin`
        can create accounts with role `super_admin`.
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:  { type: string }
                password:  { type: string }
                email:     { type: string }
                full_name: { type: string }
                phone:     { type: string }
                role:      { type: string, enum: [super_admin, admin, user], default: user }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "400": { description: Policy violation / username already taken }
  /aa/users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Users]
      summary: Get a user
      security: [ { BasicJWT: [] } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }, "404": { description: Not found } }
    put:
      tags: [Users]
      summary: Patch user profile (admin+ required)
      description: |
        Admin can update any non-super_admin user. Only `super_admin` can
        modify `super_admin` accounts or promote users to `super_admin`.
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:      { type: string }
                full_name:  { type: string }
                phone:      { type: string }
                is_enabled: { type: boolean }
                role:       { type: string, enum: [super_admin, admin, user] }
      responses: { "200": { description: OK } }
    delete:
      tags: [Users]
      summary: Delete a user (admin+; only super_admin can delete super_admin)
      security: [ { BasicJWT: [] } ]
      responses: { "200": { description: OK } }
  /aa/users/{id}/reset-password:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    post:
      tags: [Users]
      summary: Admin reset password (admin+; only super_admin can reset super_admin)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [new_password], properties: { new_password: { type: string } } }
      responses: { "200": { description: OK } }
  /aa/users/{id}/executable-commands:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Users]
      summary: List all commands a user can execute (union of all cmd_exec_groups)
      security: [ { BasicJWT: [] } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Command" } } } }
  /aa/users/{id}/accessible-nes:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Users]
      summary: List all NEs a user can access (union of all ne_access_groups)
      security: [ { BasicJWT: [] } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/NE" } } } }

  # ── NEs ────────────────────────────────────────────────────────────
  /aa/nes:
    get:
      tags: [NEs]
      summary: List NEs
      security: [ { BasicJWT: [] } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/NE" } } } } } }
    post:
      tags: [NEs]
      summary: Create NE
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/NE" } } }
      responses:
        "201": { description: Created }
        "400": { description: Namespace already taken }
  /aa/nes/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [NEs]
      security: [ { BasicJWT: [] } ]
      summary: Get NE
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/NE" } } } } }
    put:
      tags: [NEs]
      security: [ { BasicJWT: [] } ]
      summary: Update NE
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NE" } } } }
      responses: { "200": { description: OK } }
    delete:
      tags: [NEs]
      security: [ { BasicJWT: [] } ]
      summary: Delete NE — cascades to commands on this NE and group pivots
      responses: { "200": { description: OK } }
  /aa/nes/{id}/authorized-users:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [NEs]
      summary: List all users authorized to access this NE (union of all ne_access_groups)
      security: [ { BasicJWT: [] } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } }

  # ── Commands ───────────────────────────────────────────────────────
  /aa/commands:
    get:
      tags: [Commands]
      summary: List commands
      security: [ { BasicJWT: [] } ]
      parameters:
        - { name: ne_id,   in: query, schema: { type: integer, format: int64 } }
        - { name: service, in: query, schema: { type: string, enum: [ne-config, ne-command] } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Command" } } } } } }
    post:
      tags: [Commands]
      summary: Register a command — exact text, unique per (ne_id, service, cmd_text)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Command" } } }
      responses:
        "201": { description: Created }
        "400": { description: Invalid service or duplicate (ne_id, service, cmd_text) }
  /aa/commands/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    put:
      tags: [Commands]
      security: [ { BasicJWT: [] } ]
      summary: Update command
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Command" } } } }
      responses: { "200": { description: OK } }
    delete:
      tags: [Commands]
      security: [ { BasicJWT: [] } ]
      summary: Delete command — cascades to cmd_exec_group pivots
      responses: { "200": { description: OK } }
  /aa/commands/{id}/authorized-users:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Commands]
      summary: List all users authorized to execute this command (union of all cmd_exec_groups)
      security: [ { BasicJWT: [] } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } }

  # ── NE Access Groups ───────────────────────────────────────────────
  /aa/ne-access-groups:
    get:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: List groups
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Group" } } } } } }
    post:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Create group
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Group" } } } }
      responses: { "201": { description: Created } }
  /aa/ne-access-groups/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    put:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Update group
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Group" } } } }
      responses: { "200": { description: OK } }
    delete:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Delete group — cascades to user + NE pivot rows
      responses: { "200": { description: OK } }
  /aa/ne-access-groups/{id}/users:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: List user IDs in this group
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { type: integer, format: int64 } } } } } }
    post:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Add a user to the group
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [user_id], properties: { user_id: { type: integer, format: int64 } } } } } }
      responses: { "200": { description: OK } }
  /aa/ne-access-groups/{id}/users/{user_id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: user_id, in: path, required: true, schema: { type: integer, format: int64 } }
    delete:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Remove a user from the group
      responses: { "200": { description: OK } }
  /aa/ne-access-groups/{id}/nes:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: List NE IDs in this group
      responses: { "200": { description: OK } }
    post:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Add an NE to the group
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [ne_id], properties: { ne_id: { type: integer, format: int64 } } } } } }
      responses: { "200": { description: OK } }
  /aa/ne-access-groups/{id}/nes/{ne_id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: ne_id, in: path, required: true, schema: { type: integer, format: int64 } }
    delete:
      tags: [NE Access Groups]
      security: [ { BasicJWT: [] } ]
      summary: Remove an NE from the group
      responses: { "200": { description: OK } }

  # ── Cmd Exec Groups ────────────────────────────────────────────────
  /aa/cmd-exec-groups:
    get:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: List groups
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Group" } } } } } }
    post:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Create group
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Group" } } } }
      responses: { "201": { description: Created } }
  /aa/cmd-exec-groups/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    put:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Update group
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Group" } } } }
      responses: { "200": { description: OK } }
    delete:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Delete group — cascades to user + command pivot rows
      responses: { "200": { description: OK } }
  /aa/cmd-exec-groups/{id}/users:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: List user IDs in this group
      responses: { "200": { description: OK } }
    post:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Add a user to the group
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [user_id], properties: { user_id: { type: integer, format: int64 } } } } } }
      responses: { "200": { description: OK } }
  /aa/cmd-exec-groups/{id}/users/{user_id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: user_id, in: path, required: true, schema: { type: integer, format: int64 } }
    delete:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Remove a user from the group
      responses: { "200": { description: OK } }
  /aa/cmd-exec-groups/{id}/commands:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: List command IDs in this group
      responses: { "200": { description: OK } }
    post:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Add a command to the group
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [command_id], properties: { command_id: { type: integer, format: int64 } } } } } }
      responses: { "200": { description: OK } }
  /aa/cmd-exec-groups/{id}/commands/{command_id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      - { name: command_id, in: path, required: true, schema: { type: integer, format: int64 } }
    delete:
      tags: [Cmd Exec Groups]
      security: [ { BasicJWT: [] } ]
      summary: Remove a command from the group
      responses: { "200": { description: OK } }

  # ── Password Policy ────────────────────────────────────────────────
  /aa/password-policy:
    get:
      tags: [Password Policy]
      security: [ { BasicJWT: [] } ]
      summary: Get the singleton policy
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PasswordPolicy" } } } } }
    put:
      tags: [Password Policy]
      security: [ { BasicJWT: [] } ]
      summary: Upsert the singleton policy — full replace
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PasswordPolicy" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PasswordPolicy" } } } } }

  # ── Access List ────────────────────────────────────────────────────
  /aa/access-list:
    get:
      tags: [Access List]
      security: [ { BasicJWT: [] } ]
      summary: List ACL entries
      parameters:
        - { name: list_type, in: query, schema: { type: string, enum: [blacklist, whitelist] } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AccessListEntry" } } } } } }
    post:
      tags: [Access List]
      security: [ { BasicJWT: [] } ]
      summary: Create ACL entry
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AccessListEntry" } } } }
      responses: { "201": { description: Created } }
  /aa/access-list/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    delete:
      tags: [Access List]
      security: [ { BasicJWT: [] } ]
      summary: Delete ACL entry
      responses: { "200": { description: OK } }

  # ── Authorize ──────────────────────────────────────────────────────
  /aa/authorize/check:
    post:
      tags: [Authorize]
      security: [ { BasicJWT: [] } ]
      summary: Answer "can user X execute command Y on NE Z?"
      description: |
        Evaluates the flat v2 rule and returns a typed decision plus a
        trace of which specific step tripped on deny. Used by
        downstream proxies (cli-gate, ne-config, ne-command) before
        running a command, and by the admin frontend's Authorize Test tab.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, ne_id, command_id]
              properties:
                username:   { type: string }
                ne_id:      { type: integer, format: int64 }
                command_id: { type: integer, format: int64 }
      responses:
        "200":
          description: Decision
          content: { application/json: { schema: { $ref: "#/components/schemas/AuthorizeDecision" } } }

  # ── History ────────────────────────────────────────────────────────
  /aa/history:
    get:
      tags: [History]
      security: [ { BasicJWT: [] } ]
      summary: List audit entries (filtered, descending by created_date)
      parameters:
        - { name: limit,        in: query, schema: { type: integer, minimum: 1, maximum: 500, default: 100 } }
        - { name: scope,        in: query, schema: { type: string, enum: [ne-config, ne-command, mgt] } }
        - { name: ne_namespace, in: query, schema: { type: string } }
        - { name: account,      in: query, schema: { type: string } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OperationHistory" } } } } } }
  /aa/history/save:
    post:
      tags: [History]
      summary: Unauthenticated audit push (used by cli-gate / proxies)
      description: |
        Deliberately unauthenticated so proxies can push audit events
        without forwarding the operator's JWT. The `account` field is
        supplied by the caller; when the caller has a JWT the handler
        prefers the token's `sub` over the body value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cmd_text]
              properties:
                account:      { type: string }
                cmd_text:     { type: string }
                ne_namespace: { type: string }
                ne_ip:        { type: string }
                scope:        { type: string, enum: [ne-config, ne-command, mgt] }
                result:       { type: string }
      responses:
        "201": { description: Saved, content: { application/json: { schema: { $ref: "#/components/schemas/OperationHistory" } } } }
        "400": { description: cmd_text missing }

  # ── Import / Export ────────────────────────────────────────────────
  /aa/export/users:
    get:
      tags: [Import/Export]
      summary: Export all users as CSV
      description: Auth via Authorization header or _token query param.
      parameters:
        - { name: _token, in: query, schema: { type: string }, description: "JWT token (for browser download links)" }
      responses:
        "200": { description: CSV file download, content: { text/csv: { schema: { type: string } } } }
  /aa/export/nes:
    get:
      tags: [Import/Export]
      summary: Export all NEs as CSV
      parameters:
        - { name: _token, in: query, schema: { type: string } }
      responses:
        "200": { description: CSV file download }
  /aa/export/commands:
    get:
      tags: [Import/Export]
      summary: Export all commands as CSV (ne_namespace resolved)
      parameters:
        - { name: _token, in: query, schema: { type: string } }
      responses:
        "200": { description: CSV file download }
  /aa/import/users:
    post:
      tags: [Import/Export]
      summary: Bulk import users from CSV (admin+ required)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: "CSV file with header: username,password,email,full_name,phone,role,is_enabled" }
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
                  skipped: { type: integer }
                  errors:  { type: array, items: { type: string } }
  /aa/import/nes:
    post:
      tags: [Import/Export]
      summary: Bulk import NEs from CSV (admin+ required)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: "CSV: namespace,ne_type,site_name,master_ip,master_port,..." }
      responses:
        "200": { description: Import result }
  /aa/import/commands:
    post:
      tags: [Import/Export]
      summary: Bulk import commands from CSV (admin+ required)
      security: [ { BasicJWT: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: "CSV: ne_namespace,service,cmd_text,description" }
      responses:
        "200": { description: Import result }

  # ── Config Backup ──────────────────────────────────────────────────
  /aa/config-backup/save:
    post:
      tags: [Config Backup]
      security: [ { BasicJWT: [] } ]
      summary: Save a NETCONF XML config backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ne_name, config_xml]
              properties:
                ne_name:    { type: string }
                ne_ip:      { type: string }
                config_xml: { type: string }
      responses:
        "201":
          description: Saved
          content: { application/json: { schema: { type: object, properties: { status: { type: string }, id: { type: integer, format: int64 } } } } }
  /aa/config-backup/list:
    get:
      tags: [Config Backup]
      security: [ { BasicJWT: [] } ]
      summary: List backup metadata (XML contents omitted)
      parameters:
        - { name: ne_name, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string }
                  backups:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigBackup" }
  /aa/config-backup/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Config Backup]
      security: [ { BasicJWT: [] } ]
      summary: Get a backup — metadata + XML contents
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:     { type: string }
                  id:         { type: integer, format: int64 }
                  ne_name:    { type: string }
                  ne_ip:      { type: string }
                  created_at: { type: string, format: date-time }
                  size:       { type: integer, format: int64 }
                  config_xml: { type: string }
        "404": { description: Not found }

components:
  securitySchemes:
    BasicJWT:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Paste the `token` value from `/aa/authenticate` — it's already
        prefixed with `Basic `.

  schemas:
    User:
      type: object
      properties:
        id:                    { type: integer, format: int64 }
        username:              { type: string }
        email:                 { type: string }
        full_name:             { type: string }
        phone:                 { type: string }
        role:                  { type: string, enum: [super_admin, admin, user], default: user }
        is_enabled:            { type: boolean }
        password_expires_at:   { type: string, format: date-time, nullable: true }
        login_failure_count:   { type: integer, format: int32 }
        locked_at:             { type: string, format: date-time, nullable: true }
        last_login_at:         { type: string, format: date-time, nullable: true }
        created_at:            { type: string, format: date-time }
        updated_at:            { type: string, format: date-time }

    NE:
      type: object
      properties:
        id:           { type: integer, format: int64 }
        namespace:    { type: string, description: "unique id (e.g. htsmf01)" }
        ne_type:      { type: string, description: "category label (SMF / AMF / UPF / ...)" }
        site_name:    { type: string }
        description:  { type: string }
        master_ip:    { type: string }
        master_port:  { type: integer, format: int32 }
        ssh_username: { type: string }
        ssh_password: { type: string, writeOnly: true }
        command_url:  { type: string }
        conf_mode:    { type: string, enum: [SSH, TELNET, NETCONF, RESTCONF] }

    Command:
      type: object
      properties:
        id:          { type: integer, format: int64 }
        ne_id:       { type: integer, format: int64 }
        service:     { type: string, enum: [ne-config, ne-command] }
        cmd_text:    { type: string }
        description: { type: string }

    Group:
      type: object
      properties:
        id:          { type: integer, format: int64 }
        name:        { type: string }
        description: { type: string }

    PasswordPolicy:
      type: object
      description: Singleton at id=1.
      properties:
        id:                 { type: integer, format: int64, example: 1 }
        min_length:         { type: integer, format: int32 }
        max_age_days:       { type: integer, format: int32, description: "0 = no expiry" }
        require_uppercase:  { type: boolean }
        require_lowercase:  { type: boolean }
        require_digit:      { type: boolean }
        require_special:    { type: boolean }
        history_count:      { type: integer, format: int32, description: "0 = no reuse check" }
        max_login_failure:  { type: integer, format: int32, description: "0 = no lockout" }
        lockout_minutes:    { type: integer, format: int32 }

    AccessListEntry:
      type: object
      required: [list_type, match_type, pattern]
      properties:
        id:         { type: integer, format: int64 }
        list_type:  { type: string, enum: [blacklist, whitelist] }
        match_type: { type: string, enum: [username, ip_cidr, email_domain] }
        pattern:    { type: string }
        reason:     { type: string }
        created_at: { type: string, format: date-time }

    AuthorizeDecision:
      type: object
      properties:
        allowed:              { type: boolean }
        reason:               { type: string, description: "Human-readable explanation on deny" }
        user_exists:          { type: boolean }
        user_enabled:         { type: boolean }
        ne_reachable:         { type: boolean, description: "via some ne_access_group" }
        command_on_ne:        { type: boolean, description: "command.ne_id == target NE" }
        command_exec_allowed: { type: boolean, description: "via some cmd_exec_group" }

    OperationHistory:
      type: object
      properties:
        id:            { type: integer, format: int32 }
        account:       { type: string }
        cmd_text:      { type: string }
        ne_namespace:  { type: string }
        ne_ip:         { type: string }
        ip_address:    { type: string }
        scope:         { type: string, enum: [ne-config, ne-command, mgt] }
        result:        { type: string }
        created_date:  { type: string, format: date-time }
        executed_time: { type: string, format: date-time }

    ConfigBackup:
      type: object
      properties:
        id:         { type: integer, format: int64 }
        ne_name:    { type: string }
        ne_ip:      { type: string }
        file_path:  { type: string }
        size:       { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
