openapi: 3.0.3
info:
  title: mgt-service
  version: "2.0"
  description: |
    REST API quản lý người dùng, phân quyền và Network Element (NE) trong hệ thống viễn thông.

    **Authentication:** Hầu hết endpoint yêu cầu header `Authorization: Bearer <jwt_token>`.
    Token lấy từ `POST /aa/authenticate`.

servers:
  - url: http://localhost:3000
    description: Local

security: []

tags:
  - name: System
    description: Health check, Swagger UI
  - name: Authentication
    description: Đăng nhập và quản lý tài khoản
  - name: Permission
    description: Quản lý role / permission
  - name: Network Element
    description: Phân quyền NE cho user và liệt kê NE
  - name: User Authorization
    description: Gán / xóa role cho user
  - name: History
    description: Lưu lịch sử lệnh
  - name: Subscribers
    description: Xem file dữ liệu nhận từ TCP subscriber server

# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── System ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [System]
      summary: Health check (HTTP + DB ping)
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /docs:
    get:
      tags: [System]
      summary: Swagger UI
      operationId: swaggerUI
      security: []
      responses:
        "200":
          description: HTML page

  /docs/openapi.yaml:
    get:
      tags: [System]
      summary: OpenAPI spec (YAML)
      operationId: openAPISpec
      security: []
      responses:
        "200":
          description: YAML file
          content:
            application/yaml:
              schema:
                type: string

  # ── Authentication ───────────────────────────────────────────────────────────
  /aa/authenticate:
    post:
      tags: [Authentication]
      summary: Đăng nhập, lấy JWT
      operationId: authenticate
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: admin
              password: secret
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/validate-token:
    post:
      tags: [Authentication]
      summary: Kiểm tra token hợp lệ
      operationId: validateToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTokenRequest"
      responses:
        "200":
          description: Token hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /aa/change-password:
    post:
      tags: [Authentication]
      summary: Đổi mật khẩu
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Sai mật khẩu cũ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authenticate/user/set:
    post:
      tags: [Authentication]
      summary: Tạo hoặc kích hoạt lại user
      operationId: userSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSetRequest"
      responses:
        "201":
          description: Tạo / kích hoạt thành công
        "304":
          description: User đã tồn tại và đang active
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authenticate/user/delete:
    post:
      tags: [Authentication]
      summary: Vô hiệu hóa user (soft delete)
      operationId: userDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsernameRequest"
      responses:
        "200":
          description: Vô hiệu hóa thành công
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authenticate/user/show:
    get:
      tags: [Authentication]
      summary: Danh sách user kèm NE và role
      operationId: userShow
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Danh sách user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserShowItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Permission ───────────────────────────────────────────────────────────────
  /aa/authorize/permission/set:
    post:
      tags: [Permission]
      summary: Tạo role mới
      operationId: permissionSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliRole"
      responses:
        "201":
          description: Tạo thành công
        "304":
          description: Role đã tồn tại
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/permission/delete:
    post:
      tags: [Permission]
      summary: Xóa role
      operationId: permissionDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliRole"
      responses:
        "200":
          description: Xóa thành công
        "304":
          description: Role không tồn tại
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/permission/show:
    get:
      tags: [Permission]
      summary: Danh sách tất cả role
      operationId: permissionShow
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Danh sách role
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CliRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── User Authorization ───────────────────────────────────────────────────────
  /aa/authorize/user/set:
    post:
      tags: [User Authorization]
      summary: Gán permission cho user
      operationId: authorizeUserSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPermissionRequest"
      responses:
        "200":
          description: Gán thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "304":
          description: Permission đã được gán
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/user/delete:
    post:
      tags: [User Authorization]
      summary: Xóa permission của user
      operationId: authorizeUserDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPermissionRequest"
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "304":
          description: Permission không tìm thấy
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/user/show:
    get:
      tags: [User Authorization]
      summary: Danh sách permission của tất cả user
      operationId: authorizeUserShow
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Danh sách
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPermissionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Network Element ──────────────────────────────────────────────────────────
  /aa/authorize/ne/show:
    get:
      tags: [Network Element]
      summary: Danh sách NE hệ thống (5GC)
      operationId: neShow
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Danh sách NE
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeShowItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/ne/set:
    post:
      tags: [Network Element]
      summary: Gán NE cho user
      operationId: neSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserNeRequest"
      responses:
        "200":
          description: Gán thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "304":
          description: NE đã được gán cho user
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/authorize/ne/delete:
    post:
      tags: [Network Element]
      summary: Xóa NE khỏi user
      operationId: neDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserNeRequest"
      responses:
        "200":
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "304":
          description: Không tìm thấy quan hệ user-NE
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/list/ne:
    get:
      tags: [Network Element]
      summary: NE mà user đang đăng nhập được phép truy cập
      operationId: listNe
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Danh sách NE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/list/ne/monitor:
    get:
      tags: [Network Element]
      summary: NE monitor URL cho user đang đăng nhập
      operationId: listNeMonitor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Danh sách NE monitor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeMonitorItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── History ──────────────────────────────────────────────────────────────────
  /aa/history/save:
    post:
      tags: [History]
      summary: Lưu một bản ghi lịch sử lệnh
      operationId: historySave
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistorySaveRequest"
      responses:
        "201":
          description: Lưu thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliOperationHistory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Subscribers ──────────────────────────────────────────────────────────────
  /aa/subscribers/files:
    get:
      tags: [Subscribers]
      summary: Danh sách file subscriber đã lưu
      description: |
        Liệt kê tất cả file `list_subscribers_results.<index>` trong thư mục `TCP_DATA_DIR`,
        sắp xếp theo index tăng dần.
      operationId: subscriberFileList
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Danh sách file
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriberFileInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /aa/subscribers/files/{index}:
    get:
      tags: [Subscribers]
      summary: Xem nội dung file subscriber theo index
      operationId: subscriberFileView
      security:
        - bearerAuth: []
      parameters:
        - name: index
          in: path
          required: true
          description: Index của file (số nguyên >= 0)
          schema:
            type: integer
            minimum: 0
          example: 0
      responses:
        "200":
          description: Nội dung file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberFileContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable responses ───────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Request body / param không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    Unauthorized:
      description: Token thiếu hoặc không hợp lệ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    NotFound:
      description: Resource không tồn tại
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    InternalError:
      description: Lỗi server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"

  # ── Schemas ──────────────────────────────────────────────────────────────────
  schemas:

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        response_data:
          type: string
          description: JWT token
        response_code:
          type: string
          example: "200"
        system_type:
          type: string
          example: 5GC

    ValidateTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: "Format: Basic <jwt>"

    ValidateTokenResponse:
      type: object
      properties:
        username:
          type: string
        roles:
          type: string
          description: Danh sách role cách nhau bằng dấu cách

    ChangePasswordRequest:
      type: object
      required: [username, old_password, new_password]
      properties:
        username:
          type: string
        old_password:
          type: string
        new_password:
          type: string

    UsernameRequest:
      type: object
      required: [account_name]
      properties:
        account_name:
          type: string

    UserSetRequest:
      type: object
      required: [account_name, password]
      properties:
        account_name:
          type: string
        password:
          type: string
        full_name:
          type: string
        email:
          type: string
        phone_number:
          type: string
        description:
          type: string

    UserShowItem:
      type: object
      properties:
        username:
          type: string
        tblNes:
          type: array
          items:
            $ref: "#/components/schemas/NeRef"
        role:
          type: string

    NeRef:
      type: object
      properties:
        ne:
          type: string
        site:
          type: string

    # ── Permission ────────────────────────────────────────────────────────────
    CliRole:
      type: object
      properties:
        role_id:
          type: integer
          format: int64
          readOnly: true
        include_type:
          type: string
        ne_type:
          type: string
        scope:
          type: string
        permission:
          type: string
        path:
          type: string

    UserPermissionRequest:
      type: object
      required: [username, permission]
      properties:
        username:
          type: string
        permission:
          type: string

    UserPermissionItem:
      type: object
      properties:
        username:
          type: string
        permissions:
          type: string
          description: Danh sách permission cách nhau bằng dấu cách

    # ── Network Element ───────────────────────────────────────────────────────
    UserNeRequest:
      type: object
      required: [username, neid]
      properties:
        username:
          type: string
        neid:
          type: string
          description: ID của NE (dạng chuỗi số)

    NeShowItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        site_name:
          type: string
        ip_address:
          type: string
        port:
          type: integer
          format: int32
        description:
          type: string

    NeListResponse:
      type: object
      properties:
        status:
          type: string
        code:
          type: string
        message:
          type: string
        neDataList:
          type: array
          items:
            $ref: "#/components/schemas/NeDataItem"

    NeDataItem:
      type: object
      properties:
        site:
          type: string
        ne:
          type: string
        ip:
          type: string
        description:
          type: string
        namespace:
          type: string
        port:
          type: integer
          format: int32
        urlList:
          type: array
          nullable: true
          items:
            type: object
            properties:
              ipAddress:
                type: string
              port:
                type: integer

    NeMonitorItem:
      type: object
      properties:
        site:
          type: string
        ne:
          type: string
        ip:
          type: string
        description:
          type: string
        namespace:
          type: string
        port:
          type: integer
          format: int32
        ne_monitor_url:
          type: string

    # ── History ───────────────────────────────────────────────────────────────
    HistorySaveRequest:
      type: object
      required: [cmd_name, ne_name]
      properties:
        cmd_name:
          type: string
        ne_name:
          type: string
        ne_ip:
          type: string
        ne_id:
          type: integer
          format: int32
        scope:
          type: string
        result:
          type: string
        input_type:
          type: string
        session:
          type: string
        batch_id:
          type: string
        time_to_complete:
          type: integer
          format: int64
          description: Milliseconds

    CliOperationHistory:
      type: object
      properties:
        id:
          type: integer
          format: int32
        account:
          type: string
        cmd_name:
          type: string
        ne_name:
          type: string
        ne_ip:
          type: string
        ne_id:
          type: integer
          format: int32
        scope:
          type: string
        result:
          type: string
        input_type:
          type: string
        session:
          type: string
        batch_id:
          type: string
        time_to_complete:
          type: integer
          format: int64
        created_date:
          type: string
          format: date-time
        executed_time:
          type: string
          format: date-time

    # ── Subscribers ───────────────────────────────────────────────────────────
    SubscriberFileInfo:
      type: object
      properties:
        name:
          type: string
          example: list_subscribers_results.0
        index:
          type: integer
          example: 0
        size_bytes:
          type: integer
          format: int64
          example: 1024

    SubscriberFileContent:
      type: object
      properties:
        name:
          type: string
          example: list_subscribers_results.0
        index:
          type: integer
          example: 0
        lines:
          type: array
          items:
            type: string
        total:
          type: integer
          description: Tổng số dòng
          example: 42
