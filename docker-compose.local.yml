# Local stack reconstructed to match the previously-running cli-mgt-svc + cli-netconf-svc.
# Run: docker compose -f docker-compose.local.yml up -d --build
services:

  mysql:
    image: mysql:8.0
    container_name: mgt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mgt_db
      MYSQL_USER: mgtuser
      MYSQL_PASSWORD: mgtpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cli-mgt-svc:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: servergochi-cli-mgt-svc
    container_name: cli-mgt-svc
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "3675:3675"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3000"
      DB_DRIVER: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: mgtuser
      MYSQL_PASSWORD: mgtpassword
      MYSQL_DB_NAME: mgt_db
      JWT_SECRET_KEY: dev-secret-key
      JWT_EXPIRY_HOURS: "24"
      LOG_LEVEL: debug
      DB_LOG_LEVEL: warn
      CORS_ORIGINS: "*"
      ROUTER_BASE_PATH: ""
      TCP_LISTEN_PORT: "3675"
      TCP_DATA_DIR: /data/subscribers
      CLI_LOG_EXPORT_DIR: /data/csv
      CLI_CONFIG_BACKUP_DIR: /data/config-backups
      CSV_EXPORT_HOUR: "23"
      PPROF_ENABLED: "false"
      LEADER_ELECTION_ENABLED: "false"
      POD_NAME: cli-mgt-svc-local
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cli-netconf-svc:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile_cli_netconf_c
    image: servergochi-cli-netconf
    container_name: cli-netconf-svc
    restart: unless-stopped
    depends_on:
      cli-mgt-svc:
        condition: service_healthy
    ports:
      - "2222:22"
    networks:
      - default
      - confd_default
    environment:
      MGT_SVC_BASE: http://cli-mgt-svc:3000
      SEED_USERNAME: anhdt195
      SEED_PASSWORD: "123"
      LOG_LEVEL: debug

  cli-ssh-svc:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile_ssh
    image: servergochi-cli-ssh
    container_name: cli-ssh-svc
    restart: unless-stopped
    depends_on:
      cli-mgt-svc:
        condition: service_healthy
    ports:
      - "2223:2223"
    environment:
      SSH_CLI_LISTEN_ADDR: ":2223"
      SSH_CLI_HOST_KEY_PATH: /data/ssh_cli_host_key
      MGT_SVC_BASE: http://cli-mgt-svc:3000
      NE_CONFIG_SSH_ADDR: cli-netconf-svc:22
      NE_COMMAND_SSH_ADDR: cli-netconf-svc:22
      LOG_LEVEL: debug
    volumes:
      - ssh_data:/data

volumes:
  mysql_data:
  app_data:
  ssh_data:

networks:
  default:
  confd_default:
    external: true
