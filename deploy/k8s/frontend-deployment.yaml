apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgt-frontend
  namespace: default
  labels:
    app: mgt-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mgt-frontend
  template:
    metadata:
      labels:
        app: mgt-frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mgt-frontend
          image: your-registry/mgt-frontend:latest   # replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MGT_API_URL
              value: "http://mgt-service/aa"   # points to mgt-service ClusterIP
            - name: FRONTEND_PORT
              value: "8080"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
