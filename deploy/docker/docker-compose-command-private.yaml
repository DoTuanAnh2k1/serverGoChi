services:

  mysql:
    image: 172.20.1.22/proxy-cache/library/mysql:8.0
    container_name: mgt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DB_NAME:-mgt_db}
      MYSQL_USER:          ${MYSQL_USER:-mgtuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-mgtpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mgt-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cli-mgt-svc:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile_private
    container_name: cli-mgt-svc
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-9233}:${SERVER_PORT:-9233}"
      - "${TCP_LISTEN_PORT:-3675}:${TCP_LISTEN_PORT:-3675}"
      - "${PPROF_PORT:-6060}:${PPROF_PORT:-6060}"
      - "${SWAGGER_PORT:-8080}:${SWAGGER_PORT:-8080}"
    networks:
      mgt-net:
        aliases:
          - ems-aaservice
    environment:
      # Server
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: ${SERVER_PORT:-9233}

      # Database — MySQL only in this stack
      DB_DRIVER:      mysql
      MYSQL_HOST:     mysql
      MYSQL_PORT:     3306
      MYSQL_USER:     ${MYSQL_USER:-mgtuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mgtpassword}
      MYSQL_DB_NAME:  ${MYSQL_DB_NAME:-mgt_db}

      # JWT
      JWT_SECRET_KEY:   ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}

      # Logging
      LOG_LEVEL:    ${LOG_LEVEL:-info}
      DB_LOG_LEVEL: ${DB_LOG_LEVEL:-warn}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CORS_METHODS: ${CORS_METHODS:-GET,POST,DELETE,PUT,OPTIONS}
      CORS_HEADERS: ${CORS_HEADERS:-Content-Type,Authorization}

      # Router
      ROUTER_BASE_PATH: ""

      # TCP subscriber server
      TCP_LISTEN_PORT: ${TCP_LISTEN_PORT:-3675}
      TCP_DATA_DIR:    /data/subscribers

      # CSV & history export
      CLI_LOG_EXPORT_DIR: /data/csv
      CSV_EXPORT_HOUR:    ${CSV_EXPORT_HOUR:-23}

      # NETCONF config backup
      CLI_CONFIG_BACKUP_DIR: /data/config-backups

      # Profiling
      PPROF_ENABLED: ${PPROF_ENABLED:-true}
      PPROF_ADDR:    ":${PPROF_PORT:-6060}"

      # Swagger UI (dedicated port)
      SWAGGER_PORT: ${SWAGGER_PORT:-8080}

      # Leader election (disabled in docker-compose)
      LEADER_ELECTION_ENABLED: "false"
      POD_NAME: cli-mgt-svc-local

    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-9233}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  cli-command-svc:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile_cli_netconf_c
      args:
        # Đổi nếu cần dùng fork/branch khác
        CLI_NETCONF_REPO:   ${CLI_NETCONF_REPO:-https://github.com/DoTuanAnh2k1/cli-netconf.git}
        CLI_NETCONF_BRANCH: ${CLI_NETCONF_BRANCH:-feature/c-maapi-rewrite}
    image: cli-netconf-full:latest
    container_name: cli-command-svc
    restart: unless-stopped
    depends_on:
      cli-mgt-svc:
        condition: service_healthy
    ports:
      - "${NE_SSH_PORT:-2222}:22"
    networks:
      - mgt-net
    environment:
      # URL mgt-service để auth-mgt.sh gọi xác thực
      MGT_SERVICE_URL: http://ems-aaservice:${SERVER_PORT:-9233}

      # ConfD NE mặc định — override per-NE khi cần
      CONFD_IPC_ADDR: ${CONFD_IPC_ADDR:-127.0.0.1}
      CONFD_IPC_PORT: ${CONFD_IPC_PORT:-4565}
      NE_NAME:        ${NE_NAME:-confd}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
  app_data:

networks:
  mgt-net:
    driver: bridge
