<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cli-mgt v2</title>
<style>
  :root {
    --bg: #f3f8ff;
    --panel: #ffffff;
    --panel-alt: #eef4ff;
    --ink: #0f172a;
    --ink-muted: #475569;
    --border: #dbe4f2;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --accent: #06b6d4;
    --good: #16a34a;
    --warn: #f59e0b;
    --bad: #dc2626;
    --radius: 10px;
    --shadow: 0 4px 14px rgba(37, 99, 235, 0.07);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    color: var(--ink); background: var(--bg);
  }
  header {
    display: flex; align-items: center; gap: 14px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff; box-shadow: var(--shadow);
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: .3px; }
  header .tag {
    font-size: 11px; background: rgba(255,255,255,0.2); padding: 3px 8px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: .5px;
  }
  header .spacer { flex: 1; }
  header select, header button {
    background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  header button:hover { background: rgba(255,255,255,0.25); }
  #user-badge { font-size: 13px; }
  main { display: grid; grid-template-columns: 230px 1fr; min-height: calc(100vh - 50px); }
  nav {
    background: linear-gradient(180deg, #f8faff 0%, #eef2ff 100%); border-right: 1px solid var(--border); padding: 16px 0;
  }
  nav .group-label {
    padding: 10px 18px 4px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .8px; color: var(--primary); font-weight: 700;
  }
  nav a {
    display: block; padding: 8px 18px; color: var(--ink); text-decoration: none;
    border-left: 3px solid transparent; font-size: 13.5px; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  nav a:hover { background: #dbeafe; }
  nav a.active {
    border-left-color: var(--primary); background: linear-gradient(90deg, #dbeafe 0%, #eff6ff 100%);
    color: var(--primary); font-weight: 600;
  }
  section.tab { padding: 20px; }
  section.tab h2 { margin: 0 0 12px; font-size: 20px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar input, .toolbar select {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  button.btn { cursor: pointer; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; }
  button.btn-primary { background: var(--primary); color: #fff; }
  button.btn-primary:hover { background: var(--primary-hover); }
  button.btn-secondary { background: var(--panel-alt); color: var(--ink); border: 1px solid var(--border); }
  button.btn-danger { background: var(--bad); color: #fff; }
  button.btn-sm { padding: 4px 10px; font-size: 12px; }
  table.data {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  table.data th, table.data td {
    padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  table.data th { background: linear-gradient(135deg, #1e3a5f, #2563eb); font-weight: 600; color: #fff; }
  table.data tr:last-child td { border-bottom: none; }
  table.data tr:nth-child(even) td { background: #f0f4ff; }
  table.data tr:nth-child(odd) td { background: #ffffff; }
  table.data tr:hover td { background: #dbeafe; }
  .paging {
    display: flex; gap: 4px; align-items: center; margin-top: 12px; justify-content: flex-end;
  }
  .paging button {
    border: 1px solid var(--border); background: var(--panel); padding: 4px 10px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .paging button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .paging button:disabled { opacity: .4; cursor: not-allowed; }
  .paging span { font-size: 12px; color: var(--ink-muted); margin: 0 8px; }

  .modal-back {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--panel); border-radius: var(--radius); padding: 20px;
    min-width: 420px; max-width: 640px; max-height: 90vh; overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { margin: 0 0 14px; }
  .form-row {
    display: grid; grid-template-columns: 150px 1fr; gap: 10px; margin-bottom: 10px;
    align-items: center;
  }
  .form-row label { font-size: 13px; color: var(--ink-muted); }
  .form-row input, .form-row select, .form-row textarea {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; width: 100%;
  }
  .form-row textarea { min-height: 60px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .form-row.checkbox-row { grid-template-columns: 1fr; }
  .form-row.checkbox-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .form-row.checkbox-row input[type="checkbox"] { width: auto; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .toast {
    position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 8px;
    color: #fff; box-shadow: var(--shadow); z-index: 200; opacity: 0; transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: var(--good); }
  .toast.err { background: var(--bad); }

  .pill {
    display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px;
    font-weight: 600; letter-spacing: .3px;
  }
  .pill-green { background: #dcfce7; color: #166534; }
  .pill-red { background: #fee2e2; color: #991b1b; }
  .pill-amber { background: #fef3c7; color: #92400e; }
  .pill-blue { background: #dbeafe; color: #1e40af; }
  .pill-purple { background: #ede9fe; color: #6b21a8; }
  .pill-cyan { background: #cffafe; color: #155e75; }
  .pill-orange { background: #ffedd5; color: #9a3412; }

  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.13); }
  .card .label { font-size: 12px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .4px; }
  .card .value { font-size: 26px; font-weight: 700; margin-top: 4px; color: var(--ink); }
  .card .sub { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }
  .card.accent { border-top: 3px solid var(--primary); background: linear-gradient(180deg, #eff6ff 0%, #fff 100%); }
  .card.warn { border-top: 3px solid var(--warn); background: linear-gradient(180deg, #fffbeb 0%, #fff 100%); }
  .card.bad { border-top: 3px solid var(--bad); background: linear-gradient(180deg, #fef2f2 0%, #fff 100%); }
  .card.good { border-top: 3px solid var(--good); background: linear-gradient(180deg, #f0fdf4 0%, #fff 100%); }

  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .panel h4 { margin: 0 0 10px; font-size: 14px; color: var(--ink); }
  .inline-code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px;
    background: #f1f5f9; padding: 1px 5px; border-radius: 4px; color: var(--primary);
  }
  .dim { color: var(--ink-muted); }
  .grow { flex: 1; }
  .guide-body h3 { color: var(--primary); margin: 20px 0 6px; }
  .guide-body code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; }
  .guide-body pre {
    background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px;
    overflow-x: auto; font-size: 12px; margin: 8px 0;
  }
  .authz-result {
    padding: 14px; border-radius: var(--radius); margin-top: 10px; font-size: 13px;
  }
  .authz-result.allow { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .authz-result.deny  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .trace-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .trace-row .tick { width: 14px; }

  /* ── Dashboard v2 styles ── */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 960px) { .dash-grid { grid-template-columns: 1fr; } }
  .dash-full { grid-column: 1 / -1; }

  .stat-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s;
    border-left: 4px solid var(--primary);
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.13); }
  .stat-card .sc-icon {
    width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .stat-card .sc-body { flex: 1; min-width: 0; }
  .stat-card .sc-value { font-size: 24px; font-weight: 700; line-height: 1.1; }
  .stat-card .sc-label { font-size: 11.5px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  .stat-card .sc-sub { font-size: 11px; color: var(--ink-muted); margin-top: 4px; }
  .stat-card.blue   { border-left-color: #2563eb; }
  .stat-card.blue .sc-icon   { background: #dbeafe; color: #1e40af; }
  .stat-card.green  { border-left-color: #16a34a; }
  .stat-card.green .sc-icon  { background: #dcfce7; color: #166534; }
  .stat-card.amber  { border-left-color: #f59e0b; }
  .stat-card.amber .sc-icon  { background: #fef3c7; color: #92400e; }
  .stat-card.red    { border-left-color: #dc2626; }
  .stat-card.red .sc-icon    { background: #fee2e2; color: #991b1b; }
  .stat-card.purple { border-left-color: #7c3aed; }
  .stat-card.purple .sc-icon { background: #ede9fe; color: #6b21a8; }
  .stat-card.cyan   { border-left-color: #06b6d4; }
  .stat-card.cyan .sc-icon   { background: #cffafe; color: #155e75; }

  .panel-v2 {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow);
  }
  .panel-v2 .pv2-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    font-size: 14px; font-weight: 700; color: var(--ink);
  }
  .panel-v2 .pv2-head .pv2-icon { font-size: 16px; }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
  .bar-row .bar-label { width: 90px; text-align: right; color: var(--ink-muted); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-row .bar-track { flex: 1; height: 22px; background: #f1f5f9; border-radius: 6px; overflow: hidden; position: relative; }
  .bar-row .bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: #fff; min-width: 28px; }
  .bar-row .bar-count { width: 36px; font-weight: 600; text-align: right; }

  .gauge-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .gauge-row .gauge-label { font-size: 12px; color: var(--ink-muted); width: 80px; }
  .gauge-row .gauge-track { flex: 1; height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden; }
  .gauge-row .gauge-fill { height: 100%; border-radius: 5px; transition: width .5s ease; }
  .gauge-row .gauge-val { font-size: 12px; font-weight: 600; width: 70px; text-align: right; }

  .ne-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
  .ne-card {
    background: linear-gradient(135deg, #f8faff 0%, #fff 100%);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s;
  }
  .ne-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.13); }
  .ne-card .ne-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ne-card .ne-head .ne-ns { font-weight: 700; font-size: 15px; color: var(--primary); }
  .ne-card .ne-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .ne-card .ne-metric { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .ne-card .ne-metric .nm-icon { font-size: 13px; }
  .ne-card .ne-metric .nm-val { font-weight: 700; }
  .ne-card .ne-metric .nm-lbl { color: var(--ink-muted); }
  .ne-card .ne-foot { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--ink-muted); display: flex; gap: 12px; }

  .security-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 640px) { .security-grid { grid-template-columns: 1fr; } }
  .sec-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 6px 0; }
  .sec-item .sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sec-item .sec-dot.on { background: #16a34a; }
  .sec-item .sec-dot.off { background: #cbd5e1; }
  .sec-item .sec-label { color: var(--ink-muted); }
  .sec-item .sec-val { font-weight: 600; margin-left: auto; }

  .history-mini td { padding: 7px 10px !important; }
  .result-pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 600; }
  .result-ok { background: #dcfce7; color: #166534; }
  .result-fail { background: #fee2e2; color: #991b1b; }
  .result-other { background: #f1f5f9; color: #475569; }
</style>
</head>

<header>
  <h1>cli-mgt</h1>
  <span class="tag">v2</span>
  <span class="spacer"></span>
  <select id="lang-select" aria-label="Language">
    <option value="en">English</option>
    <option value="vi">Tiếng Việt</option>

  <span id="user-badge"></span>
  <button id="logout-btn">Logout</button>
</header>

<main>
  <nav id="nav">
    <div class="group-label" data-i18n="nav.overview">Overview</div>
    <a data-tab="dashboard" data-i18n="nav.dashboard">Dashboard</a>

    <div class="group-label" data-i18n="nav.identity">Identity</div>
    <a data-tab="users" data-i18n="nav.users">Users</a>

    <a data-tab="password-policy" data-i18n="nav.password_policy">Password Policy</a>

    <div class="group-label" data-i18n="nav.inventory">Inventory</div>
    <a data-tab="nes" data-i18n="nav.nes">NEs</a>
    <a data-tab="commands" data-i18n="nav.commands">Commands</a>

    <div class="group-label" data-i18n="nav.authorization">Authorization</div>
    <a data-tab="ne-access-groups" data-i18n="nav.ne_access_groups">NE Access Groups</a>
    <a data-tab="cmd-exec-groups" data-i18n="nav.cmd_exec_groups">Cmd Exec Groups</a>
    <a data-tab="authorize-test" data-i18n="nav.authorize_test">Authorize Test</a>

    <a data-tab="history" data-i18n="nav.history">History</a>

  <section id="content" class="tab"></section>
</main>

<div id="modal-back" class="modal-back">
  <div id="modal" class="modal"></div>
</div>

<div id="toast" class="toast"></div>

    'auth.allow':'CHO PHÉP','auth.deny':'TỪ CHỐI',

};
let LANG = localStorage.getItem('lang') || 'en';
function t(key){ return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key; }
function applyI18n(){ document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n'))); }

let MY_ROLE = localStorage.getItem('role') || 'user';
function isAdmin(){ return MY_ROLE === 'admin' || MY_ROLE === 'super_admin'; }
function isSuperAdmin(){ return MY_ROLE === 'super_admin'; }
function rolePill(role){
  if (role === 'super_admin') return '<span class="pill pill-red">super_admin</span>';
  if (role === 'admin') return '<span class="pill pill-cyan">admin</span>';
  return '<span class="pill pill-green">user</span>';
}

const API = {
  base: '',
  token: localStorage.getItem('token') || '',
  async req(method, path, body){
    const h = { 'Content-Type':'application/json' };
    if (this.token) h['Authorization'] = this.token;
    const opts = { method, headers: h };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(this.base + path, opts);
    if (res.status === 401){ this.token = ''; localStorage.removeItem('token'); showLogin(); throw new Error('unauthorized'); }
    const text = await res.text();
    let data;
    try { data = text ? JSON.parse(text) : null; } catch { data = text; }
    if (!res.ok) throw new Error((data && (data.message||data.error)) || ('HTTP '+res.status));
    return data;
  },
  get(p){ return this.req('GET', p); },
  post(p,b){ return this.req('POST', p, b); },
  put(p,b){ return this.req('PUT', p, b); },
  del(p){ return this.req('DELETE', p); },
};

function toast(msg, ok=true){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.className = 'toast', 2200);
}

function openModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-back').classList.add('open');
}
function closeModal(){ document.getElementById('modal-back').classList.remove('open'); }
document.getElementById('modal-back').addEventListener('click', (e) => {
  if (e.target.id === 'modal-back') closeModal();
});

function renderPaged(rows, page, pageSize){
  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  page = Math.min(Math.max(1, page), totalPages);
  const start = (page-1)*pageSize;
  const pageRows = rows.slice(start, start+pageSize);
  return { pageRows, page, totalPages, total, start };
}
function pagingBar(page, totalPages, onChange){
  const w = document.createElement('div'); w.className = 'paging';
  const prev = document.createElement('button'); prev.textContent = '‹'; prev.disabled = page<=1;
  prev.onclick = () => onChange(page-1);
  const next = document.createElement('button'); next.textContent = '›'; next.disabled = page>=totalPages;
  next.onclick = () => onChange(page+1);
  const lbl = document.createElement('span'); lbl.textContent = `${page} / ${totalPages}`;
  w.appendChild(prev); w.appendChild(lbl); w.appendChild(next);
  return w;
}

function showLogin(){
  document.getElementById('content').innerHTML = '';
  openModal(`
    <h3>${t('login.title')}</h3>
    <div class="form-row"><label>${t('login.user')}</label><input id="li-u" autofocus></div>
    <div class="form-row"><label>${t('login.pass')}</label><input id="li-p" type="password"></div>
    <div class="actions"><button class="btn btn-primary" onclick="doLogin()">${t('login.submit')}</button></div>
    <div id="li-err" style="color:var(--bad);margin-top:8px;font-size:12px;"></div>
  `);
  document.getElementById('li-p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}
async function doLogin(){
  const u = document.getElementById('li-u').value.trim();
  const p = document.getElementById('li-p').value;
  try {
    const res = await API.post('/aa/authenticate', { username: u, password: p });
    API.token = res.token;
    MY_ROLE = res.role || 'user';
    localStorage.setItem('token', res.token);
    localStorage.setItem('username', u);
    localStorage.setItem('role', MY_ROLE);
    closeModal();
    document.getElementById('user-badge').innerHTML = esc(u) + ' ' + rolePill(MY_ROLE);
    showTab('dashboard');
  } catch (e) {
    document.getElementById('li-err').textContent = t('login.err') + ': ' + e.message;
  }
}
document.getElementById('logout-btn').onclick = () => {
  API.token = ''; MY_ROLE = 'user';
  localStorage.removeItem('token'); localStorage.removeItem('username'); localStorage.removeItem('role');
  document.getElementById('user-badge').textContent = '';
  showLogin();
};

const TABS = {};
function showTab(id){
  document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.getAttribute('data-tab') === id));
  const fn = TABS[id];
  const c = document.getElementById('content');
  c.innerHTML = '';
  if (fn) fn(c);
}
document.querySelectorAll('nav a').forEach(a => {
  a.onclick = () => showTab(a.getAttribute('data-tab'));
});

  try {

      API.get('/aa/users'), API.get('/aa/nes'), API.get('/aa/commands'),

  function fmtUptime(s) {
    if (!s) return '0s';
    const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), mn = Math.floor((s%3600)/60);
    if (d > 0) return d+'d '+h+'h';
    if (h > 0) return h+'h '+mn+'m';
    return mn+'m '+Math.floor(s%60)+'s';
  }

  function statCard(color, icon, value, label, sub) {
    return `<div class="stat-card ${color}">
      <div class="sc-icon">${icon}</div>
      <div class="sc-body">
        <div class="sc-value">${value}</div>
        <div class="sc-label">${label}</div>
        ${sub ? `<div class="sc-sub">${sub}</div>` : ''}
      </div>
    </div>`;
  }

  function barChart(items, colors) {
    const max = Math.max(1, ...items.map(i=>i.count));
    return '<div class="bar-chart">' + items.map((it,i) => {
      const pct = Math.max(4, (it.count/max)*100);
      const bg = colors[i % colors.length];
      return `<div class="bar-row">
        <span class="bar-label" title="${esc(it.label)}">${esc(it.label)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bg}">${it.count}</div></div>
      </div>`;
    }).join('') + '</div>';
  }

    const pct = max > 0 ? Math.min(100, (val/max)*100) : 0;
    return `<div class="gauge-row">
      <span class="gauge-label">${label}</span>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>

function listView(opts){
  const { container } = opts;
  let page = 1; const pageSize = 20;
  let rows = []; let filtered = [];
  const bar = document.createElement('div'); bar.className = 'toolbar';
  const showWrite = isAdmin();
  bar.innerHTML = `<input id="lv-q" placeholder="${t('btn.search')}…" />
    <button class="btn btn-secondary" id="lv-refresh">${t('btn.refresh')}</button>
    ${opts.exportPath ? `<button class="btn btn-secondary" id="lv-export">⬇ Export CSV</button>` : ''}
    ${opts.importPath && showWrite ? `<button class="btn btn-secondary" id="lv-import">⬆ Import CSV</button><input type="file" id="lv-import-file" accept=".csv" style="display:none">` : ''}
    <span class="grow"></span>
    ${opts.onNew && showWrite ? `<button class="btn btn-primary" id="lv-new">＋ ${t('btn.new')}</button>` : ''}`;
  container.appendChild(bar);
  const tblWrap = document.createElement('div'); container.appendChild(tblWrap);
  const pageWrap = document.createElement('div'); container.appendChild(pageWrap);

  function renderTable(){
    const q = (document.getElementById('lv-q').value||'').toLowerCase().trim();
    filtered = !q ? rows : rows.filter(r => (opts.searchKeys||Object.keys(r)).some(k => String(r[k]||'').toLowerCase().includes(q)));
    const r = renderPaged(filtered, page, pageSize);
    page = r.page;
    let html = '<table class="data"><thead><tr>';
    opts.columns.forEach(c => html += `<th>${c.label}</th>`);
    if (opts.rowActions && showWrite) html += '<th></th>';
    html += '</tr></thead><tbody>';
    r.pageRows.forEach((row, idx) => {
      html += '<tr>';
      opts.columns.forEach(c => html += `<td>${c.render ? c.render(row) : esc(row[c.key] ?? '')}</td>`);
      if (opts.rowActions && showWrite) {
        const actions = opts.rowActions(row, idx).filter(a => !a.hidden);
        html += `<td style="text-align:right;">${actions.map((a,i) => `<button class="btn btn-sm ${a.cls||'btn-secondary'}" data-lv-i="${idx}" data-lv-a="${i}">${a.label}</button>`).join(' ')}</td>`;
      }
      html += '</tr>';
    });
    if (r.pageRows.length === 0) html += `<tr><td colspan="${opts.columns.length + (opts.rowActions && showWrite ?1:0)}" class="dim" style="text-align:center;padding:22px;">No entries.</td></tr>`;
    html += '</tbody></table>';
    tblWrap.innerHTML = html;
    if (opts.rowActions && showWrite){
      tblWrap.querySelectorAll('button[data-lv-a]').forEach(btn => {
        btn.onclick = () => {
          const i = +btn.getAttribute('data-lv-i');
          const a = +btn.getAttribute('data-lv-a');
          const globalIdx = r.start + i;
          const actions = opts.rowActions(filtered[globalIdx], globalIdx).filter(x => !x.hidden);
          actions[a].fn(filtered[globalIdx]);
        };
      });
    }
    pageWrap.innerHTML = '';
    pageWrap.appendChild(pagingBar(page, r.totalPages, (p) => { page = p; renderTable(); }));
  }
  async function reload(){
    try { rows = await opts.fetch(); renderTable(); }
    catch(e){ toast(e.message, false); }
  }
  document.getElementById('lv-refresh').onclick = reload;
  document.getElementById('lv-q').oninput = () => { page = 1; renderTable(); };
  if (opts.onNew && showWrite) document.getElementById('lv-new').onclick = opts.onNew;
  if (opts.exportPath) {
    document.getElementById('lv-export').onclick = () => {
      const a = document.createElement('a');
      a.href = API.base + opts.exportPath;
      // Append token as query param for download (no fetch needed).
      a.href += (opts.exportPath.includes('?') ? '&' : '?') + '_token=' + encodeURIComponent(API.token);
      a.download = ''; a.click();
    };
  }
  if (opts.importPath && showWrite) {
    document.getElementById('lv-import').onclick = () => document.getElementById('lv-import-file').click();
    document.getElementById('lv-import-file').onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const form = new FormData(); form.append('file', file);
      try {
        const res = await fetch(API.base + opts.importPath, {
          method: 'POST', headers: { 'Authorization': API.token }, body: form
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || data.error || 'import failed');
        const msg = `Created: ${data.created}, Skipped: ${data.skipped}` +
          (data.errors && data.errors.length ? `\nErrors:\n${data.errors.join('\n')}` : '');
        toast(msg, true); reload();
      } catch(err) { toast(err.message, false); }
      e.target.value = '';
    };
  }
  reload();
  return { reload };
}

function buildForm(fields, initial){
  return fields.map(f => {
    const v = initial ? (initial[f.key] ?? '') : (f.default ?? '');
    const id = 'f-' + f.key;
    if (f.type === 'checkbox') {
      return `<div class="form-row checkbox-row"><label><input type="checkbox" id="${id}" ${v ? 'checked' : ''}> ${f.label}</label></div>`;
    }
    if (f.type === 'select') {
      return `<div class="form-row"><label>${f.label}</label>
        <select id="${id}">${(f.options||[]).map(o => `<option value="${esc(o.value)}" ${String(o.value)===String(v)?'selected':''}>${esc(o.label)}</option>`).join('')}</select>
      </div>`;
    }
    if (f.type === 'textarea') {
      return `<div class="form-row"><label>${f.label}</label><textarea id="${id}">${esc(v)}</textarea></div>`;
    }
    return `<div class="form-row"><label>${f.label}</label><input type="${f.type||'text'}" id="${id}" value="${esc(v)}"></div>`;
  }).join('');
}
function readForm(fields){
  const out = {};
  fields.forEach(f => {
    const el = document.getElementById('f-' + f.key);
    if (!el) return;
    if (f.type === 'checkbox') out[f.key] = el.checked;
    else if (f.type === 'number') out[f.key] = el.value === '' ? 0 : parseInt(el.value, 10);
    else out[f.key] = el.value;
  });
  return out;
}

async function userPermissions(user) {
  let cmds = [], nes = [];
  try {
    [cmds, nes] = await Promise.all([
      API.get('/aa/users/' + user.id + '/executable-commands'),
      API.get('/aa/users/' + user.id + '/accessible-nes'),
    ]);
  } catch(e) { toast(e.message, false); }
  cmds = cmds || []; nes = nes || [];
  const neMap = {};
  nes.forEach(n => { neMap[n.id] = n; });
  // Group commands by NE namespace.
  const byNE = {};
  cmds.forEach(cmd => {
    const ne = neMap[cmd.ne_id];
    const ns = ne ? ne.namespace : 'NE#'+cmd.ne_id;
    if (!byNE[ns]) byNE[ns] = [];
    byNE[ns].push(cmd);
  });
  let cmdHTML = '';
  if (cmds.length === 0) {
    cmdHTML = '<div class="dim" style="padding:8px 0">No executable commands assigned.</div>';
  } else {
    cmdHTML = Object.entries(byNE).map(([ns, list]) =>
      `<div style="margin-bottom:10px">
        <div style="font-weight:600;margin-bottom:4px"><span class="pill pill-blue">${esc(ns)}</span> <span class="dim">(${list.length} commands)</span></div>
        <table class="data" style="font-size:12px"><thead><tr><th>ID</th><th>Service</th><th>Command</th><th>Description</th></tr></thead><tbody>` +
        list.map(c => `<tr><td>${c.id}</td><td><span class="pill pill-cyan">${esc(c.service)}</span></td><td style="font-family:monospace;font-size:11.5px">${esc(c.cmd_text)}</td><td class="dim">${esc(c.description||'')}</td></tr>`).join('') +
        '</tbody></table></div>'
    ).join('');
  }
  let neHTML = '';
  if (nes.length === 0) {
    neHTML = '<div class="dim" style="padding:8px 0">No accessible NEs assigned.</div>';
  } else {
    neHTML = '<table class="data" style="font-size:12px"><thead><tr><th>Namespace</th><th>Type</th><th>Site</th><th>IP</th><th>Mode</th></tr></thead><tbody>' +
      nes.map(n => `<tr><td><strong>${esc(n.namespace)}</strong></td><td><span class="pill pill-purple">${esc((n.ne_type||'').toUpperCase())}</span></td><td>${esc(n.site_name||'')}</td><td>${esc(n.master_ip||'')}</td><td>${esc(n.conf_mode||'')}</td></tr>`).join('') +
      '</tbody></table>';
  }
  openModal(`<h3>Permissions — ${esc(user.username)} ${rolePill(user.role)}</h3>
    <div class="panel"><h4>Accessible NEs (${nes.length})</h4>${neHTML}</div>
    <div class="panel"><h4>Executable Commands (${cmds.length})</h4>${cmdHTML}</div>
    <div class="actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

async function groupMembers(group, kind){

  try {
    [userIds, peerIds, users, peers] = await Promise.all([
      API.get(kind.basePath+'/'+group.id+'/users'),
      API.get(kind.basePath+'/'+group.id+'/'+kind.peerRoute),
      API.get('/aa/users'),
      kind.peerFetch(),
    ]);
  } catch(e){ toast(e.message,false); }
  userIds = userIds || []; peerIds = peerIds || [];
  const userMap = Object.fromEntries((users||[]).map(u => [u.id, u.username]));
  const peerMap = Object.fromEntries((peers||[]).map(p => [p.id, kind.peerLabelFn(p)]));
  openModal(`<h3>${esc(group.name)} — members</h3>
    <div class="panel"><h4>Users (${userIds.length})</h4>
      <div id="gm-users" style="margin-bottom:8px;">${userIds.map(id => `<span class="pill pill-blue">${esc(userMap[id]||id)} <a href="#" data-rmu="${id}" style="color:#991b1b;text-decoration:none;">×</a></span>`).join(' ') || '<span class="dim">— none —</span>'}</div>
      <div class="toolbar">
        <select id="add-u">${(users||[]).filter(u => !userIds.includes(u.id)).map(u => `<option value="${u.id}">${esc(u.username)}</option>`).join('')}</select>
        <button class="btn btn-primary btn-sm" id="add-u-btn">Add user</button>
      </div>
    </div>
    <div class="panel"><h4>${kind.peerLabel} (${peerIds.length})</h4>
      <div id="gm-peers" style="margin-bottom:8px;">${peerIds.map(id => `<span class="pill pill-purple">${esc(peerMap[id]||id)} <a href="#" data-rmp="${id}" style="color:#991b1b;text-decoration:none;">×</a></span>`).join(' ') || '<span class="dim">— none —</span>'}</div>
      <div class="toolbar">
        <select id="add-p">${(peers||[]).filter(p => !peerIds.includes(p.id)).map(p => `<option value="${p.id}">${esc(kind.peerLabelFn(p))}</option>`).join('')}</select>

      </div>
    </div>
    <div class="actions"><button class="btn btn-secondary" onclick="closeModal()">${t('btn.cancel')}</button></div>`);
  document.getElementById('add-u-btn').onclick = async () => {
    const uid = +document.getElementById('add-u').value;
    try { await API.post(kind.basePath+'/'+group.id+'/users', { user_id: uid }); toast('added'); groupMembers(group, kind); }
    catch(e){ toast(e.message, false); }
  };
  document.getElementById('add-p-btn').onclick = async () => {
    const pid = +document.getElementById('add-p').value;
    const body = {}; body[kind.peerIdKey] = pid;
    try { await API.post(kind.basePath+'/'+group.id+'/'+kind.peerRoute, body); toast('added'); groupMembers(group, kind); }
    catch(e){ toast(e.message, false); }
  };
  document.querySelectorAll('[data-rmu]').forEach(a => a.onclick = async (e) => {
    e.preventDefault();
    try { await API.del(kind.basePath+'/'+group.id+'/users/'+a.getAttribute('data-rmu')); toast('removed'); groupMembers(group, kind); }
    catch(err){ toast(err.message, false); }
  });
  document.querySelectorAll('[data-rmp]').forEach(a => a.onclick = async (e) => {
    e.preventDefault();

    catch(err){ toast(err.message, false); }
  });
}

    <div class="dim">${t('auth.prompt')}</div>
    <div class="form-row"><label>${t('auth.user')}</label>
      <select id="az-u">${users.map(u => `<option value="${esc(u.username)}">${esc(u.username)}</option>`).join('')}</select></div>
    <div class="form-row"><label>${t('auth.ne')}</label>
      <select id="az-ne">${nes.map(n => `<option value="${n.id}">${esc(n.namespace)} (${esc(n.ne_type||'')})</option>`).join('')}</select></div>
    <div class="form-row"><label>${t('auth.cmd')}</label>
      <select id="az-cmd">${cmds.map(c => `<option value="${c.id}">#${c.id} ${esc(c.service)} / ${esc((c.cmd_text||'').slice(0,60))}</option>`).join('')}</select></div>
    <div class="actions"><button class="btn btn-primary" id="az-go">${t('auth.check')}</button></div>
    <div id="az-out"></div>`;
  document.getElementById('az-go').onclick = async () => {
    const body = {
      username: document.getElementById('az-u').value,
      ne_id: +document.getElementById('az-ne').value,
      command_id: +document.getElementById('az-cmd').value,
    };
    try {
      const d = await API.post('/aa/authorize/check', body);
      const cls = d.allowed ? 'allow' : 'deny';
      const row = (ok, label) => `<div class="trace-row"><span class="tick">${ok?'✔':'✘'}</span> ${label}</div>`;
      document.getElementById('az-out').innerHTML = `<div class="authz-result ${cls}">
        <b>${d.allowed ? t('auth.allow') : t('auth.deny')}</b>${d.reason ? ' — ' + esc(d.reason) : ''}
        <div style="margin-top:8px;">
          ${row(d.user_exists,'user exists')}
          ${row(d.user_enabled,'user enabled + not locked')}
          ${row(d.command_on_ne,'command registered on target NE')}
          ${row(d.ne_reachable,'NE access group grants this NE')}
          ${row(d.command_exec_allowed,'cmd-exec group grants this command')}
        </div></div>`;
    } catch(e){ toast(e.message, false); }
  };
};

TABS.guide = (c) => {

      <p><b>API endpoints:</b></p>

function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(s){ if (!s) return ''; try { return new Date(s).toLocaleString(); } catch { return s; } }
